name: tvninja
description: IPTV M3U8 Viewer - Watch your favorite TV channels

publish_to: "none"

version: 1.3.29

environment:
  sdk: ">=3.1.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # TODO: Change back to git ref before committing
  ninja_material:
    git:
      url: https://github.com/Giuig/ninja_material.git
      ref: v1.4.3

  # IPTV dependencies
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_android_video: ^1.3.8
  http: ^1.2.0
  wakelock_plus: ^1.5.1

  # Background audio - using native Kotlin for best performance
  # just_audio removed - using native ExoPlayer via Platform Channels
  
  # Database - cross-platform (web + android)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image caching
  cached_network_image: ^3.4.1

  # Utilities
  path_provider: ^2.1.1
  uuid: ^4.2.1
  collection: ^1.18.0
  web: ^1.1.0
  device_info_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: The Hand
      fonts:
        - asset: assets/fonts/The Hand Regular.otf

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#3F5189"  # pale dark indigo - matches app theme
  adaptive_icon_foreground: "assets/icons/app_icon.png"
